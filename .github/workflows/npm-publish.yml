name: npm publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional git tag to publish from'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag != '' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure npm auth from token
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN

      - name: Use trusted publishing
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "No NPM_TOKEN found. Publishing will use npm trusted publishing with OIDC."

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
